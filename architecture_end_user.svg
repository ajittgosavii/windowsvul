  <text x="160" y="725" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="bold">&#x1F6E1;&#xFE0F; Security Engineer</text>
  <text x="160" y="743" text-anchor="middle" fill="#64748b" font-size="9">Agent Brain, Policies, Approvals</text>

  <!-- DevOps -->
  <rect x="290" y="705" width="200" height="50" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1"/>
  <text x="390" y="725" text-anchor="middle" fill="#065f46" font-size="11" font-weight="bold">&#x2699;&#xFE0F; DevOps Engineer</text>
  <text x="390" y="743" text-anchor="middle" fill="#64748b" font-size="9">Fleet View, Pipeline, Scripts</text>

  <!-- ITSM / Change Manager -->
  <rect x="520" y="705" width="200" height="50" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="620" y="725" text-anchor="middle" fill="#92400e" font-size="11" font-weight="bold">&#x1F3AB; Change Manager</text>
  <text x="620" y="743" text-anchor="middle" fill="#64748b" font-size="9">ITSM, CHG tickets, Approvals</text>

