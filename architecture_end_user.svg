  <rect x="740" y="300" width="130" height="65" rx="10" fill="#f0fdf4" stroke="#10b981" stroke-width="2" filter="url(#sh)"/>
  <text x="805" y="322" text-anchor="middle" fill="#065f46" font-size="11" font-weight="bold">&#x2705; Auto-Fix</text>
  <text x="805" y="340" text-anchor="middle" fill="#10b981" font-size="18" font-weight="bold">>= 90%</text>
  <text x="805" y="358" text-anchor="middle" fill="#64748b" font-size="8">SSM Patch Manager</text>

  <!-- Human -->
  <rect x="885" y="300" width="130" height="65" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" filter="url(#sh)"/>
  <text x="950" y="322" text-anchor="middle" fill="#92400e" font-size="11" font-weight="bold">&#x270B; Human Review</text>
  <text x="950" y="340" text-anchor="middle" fill="#f59e0b" font-size="18" font-weight="bold">70-89%</text>
  <text x="950" y="358" text-anchor="middle" fill="#64748b" font-size="8">Approval Queue</text>

  <!-- CHG Ticket -->
  <rect x="1030" y="300" width="130" height="65" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#sh)"/>
  <text x="1095" y="322" text-anchor="middle" fill="#991b1b" font-size="11" font-weight="bold">&#x1F3AB; CHG Ticket</text>
  <text x="1095" y="340" text-anchor="middle" fill="#ef4444" font-size="18" font-weight="bold">&lt; 70%</text>
  <text x="1095" y="358" text-anchor="middle" fill="#64748b" font-size="8">ServiceNow</text>

  <!-- Examples under each -->
  <text x="805" y="388" text-anchor="middle" fill="#94a3b8" font-size="8">KB security update</text>
  <text x="805" y="400" text-anchor="middle" fill="#94a3b8" font-size="8">well-tested, no reboot</text>

  <text x="950" y="388" text-anchor="middle" fill="#94a3b8" font-size="8">RDP config change</text>
  <text x="950" y="400" text-anchor="middle" fill="#94a3b8" font-size="8">on production server</text>

  <text x="1095" y="388" text-anchor="middle" fill="#94a3b8" font-size="8">Kernel update needing</text>
  <text x="1095" y="400" text-anchor="middle" fill="#94a3b8" font-size="8">maintenance window</text>

  <!-- Percentage labels -->
  <rect x="740" y="420" width="420" height="22" rx="11" fill="#f1f5f9"/>
  <rect x="740" y="420" width="168" height="22" rx="11" fill="#10b981" opacity="0.2"/>
  <rect x="908" y="420" width="126" height="22" rx="11" fill="#f59e0b" opacity="0.2"/>
  <rect x="1034" y="420" width="126" height="22" rx="11" fill="#ef4444" opacity="0.2"/>
  <text x="824" y="435" text-anchor="middle" fill="#065f46" font-size="9" font-weight="bold">~60% auto-fixed</text>
  <text x="971" y="435" text-anchor="middle" fill="#92400e" font-size="9" font-weight="bold">~25% reviewed</text>
  <text x="1097" y="435" text-anchor="middle" fill="#991b1b" font-size="9" font-weight="bold">~15% tickets</text>

  <!-- Arrow: Brain -> Decisions -->
  <path d="M680 350 L715 350" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrPurple)"/>

  <!-- ==================== ROW 3: OUTPUTS ==================== -->

  <!-- SSM Patch Manager -->
  <rect x="30" y="500" width="220" height="130" rx="12" fill="white" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="30" y="500" width="220" height="30" rx="12" fill="url(#green)"/>
  <rect x="30" y="520" width="220" height="10" fill="url(#green)"/>
  <text x="140" y="521" text-anchor="middle" fill="white" font-size="11" font-weight="bold">AWS SSM Patch Manager</text>
  <text x="50" y="550" fill="#475569" font-size="9">&#x2705; Custom baselines per OS</text>
  <text x="50" y="567" fill="#475569" font-size="9">&#x2705; RunPatchBaseline (Scan + Install)</text>
  <text x="50" y="584" fill="#475569" font-size="9">&#x2705; Maintenance windows</text>
  <text x="50" y="601" fill="#475569" font-size="9">&#x2705; Compliance reporting</text>
  <text x="50" y="620" fill="#94a3b8" font-size="8">Production-grade, AWS-native</text>

  <!-- ServiceNow -->
  <rect x="280" y="500" width="220" height="130" rx="12" fill="white" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="280" y="500" width="220" height="30" rx="12" fill="url(#blue)"/>
  <rect x="280" y="520" width="220" height="10" fill="url(#blue)"/>
  <text x="390" y="521" text-anchor="middle" fill="white" font-size="11" font-weight="bold">ServiceNow ITSM</text>
  <text x="300" y="550" fill="#475569" font-size="9">&#x1F3AB; Auto-create CHG tickets</text>
  <text x="300" y="567" fill="#475569" font-size="9">&#x1F6A8; Auto-create INC for failures</text>
  <text x="300" y="584" fill="#475569" font-size="9">&#x1F4E6; CMDB sync (all servers)</text>
  <text x="300" y="601" fill="#475569" font-size="9">&#x1F4DD; Full plans: implement, backout, test</text>
  <text x="300" y="620" fill="#94a3b8" font-size="8">dev218436.service-now.com</text>

  <!-- Notifications -->
  <rect x="530" y="500" width="220" height="130" rx="12" fill="white" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="530" y="500" width="220" height="30" rx="12" fill="url(#orange)"/>
  <rect x="530" y="520" width="220" height="10" fill="url(#orange)"/>
  <text x="640" y="521" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Notifications</text>
  <text x="550" y="550" fill="#475569" font-size="9">&#x1F4AC; Slack channel alerts</text>
  <text x="550" y="567" fill="#475569" font-size="9">&#x1F4E7; Microsoft Teams cards</text>
  <text x="550" y="584" fill="#475569" font-size="9">&#x2709;&#xFE0F; Email (SMTP)</text>
  <text x="550" y="601" fill="#475569" font-size="9">&#x1F514; Severity-based routing</text>
  <text x="550" y="620" fill="#94a3b8" font-size="8">Critical = all channels</text>

  <!-- Reports -->
  <rect x="780" y="500" width="220" height="130" rx="12" fill="white" stroke="#8b5cf6" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="780" y="500" width="220" height="30" rx="12" fill="url(#purple)"/>
  <rect x="780" y="520" width="220" height="10" fill="url(#purple)"/>
  <text x="890" y="521" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Compliance &amp; Reports</text>
  <text x="800" y="550" fill="#475569" font-size="9">&#x1F4CB; NIST SP 800-53 mapping</text>
  <text x="800" y="567" fill="#475569" font-size="9">&#x1F4CB; CIS Benchmark compliance</text>
  <text x="800" y="584" fill="#475569" font-size="9">&#x1F4C4; Executive PDF reports</text>
  <text x="800" y="601" fill="#475569" font-size="9">&#x1F4C8; Trend analysis over time</text>
  <text x="800" y="620" fill="#94a3b8" font-size="8">Board-ready, audit-compliant</text>

  <!-- Rollback -->
  <rect x="1030" y="500" width="140" height="130" rx="12" fill="white" stroke="#ef4444" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="1030" y="500" width="140" height="30" rx="12" fill="url(#red)"/>
  <rect x="1030" y="520" width="140" height="10" fill="url(#red)"/>
  <text x="1100" y="521" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Rollback</text>
  <text x="1050" y="550" fill="#475569" font-size="9">&#x21A9;&#xFE0F; Auto-revert on failure</text>
  <text x="1050" y="567" fill="#475569" font-size="9">&#x1F4BE; Registry backup</text>
  <text x="1050" y="584" fill="#475569" font-size="9">&#x1F4BF; System restore point</text>
  <text x="1050" y="601" fill="#475569" font-size="9">&#x26A0;&#xFE0F; P1 incident auto</text>

  <!-- Arrows: Brain -> Outputs -->
  <path d="M300 450 L140 495" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrGreen)"/>
  <path d="M400 450 L390 495" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrBlue)"/>
  <path d="M500 450 L640 495" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#arrOrange)"/>
  <path d="M805 450 L890 495" stroke="#8b5cf6" stroke-width="1.5" fill="none" marker-end="url(#arrPurple)"/>
  <path d="M950 450 L1100 495" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arrRed)"/>

  <!-- ==================== ROW 4: USER ROLES ==================== -->

  <rect x="30" y="665" width="1140" height="105" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="600" y="690" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">Who Uses What</text>

  <!-- Security Engineer -->
