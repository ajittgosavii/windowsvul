<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/><stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/><stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/><stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/><stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/><stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/><stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/><stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <filter id="shDeep"><feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.18"/></filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#64748b"/></marker>
    <marker id="arrBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#3b82f6"/></marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#10b981"/></marker>
    <marker id="arrOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#f59e0b"/></marker>
    <marker id="arrRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#ef4444"/></marker>
    <marker id="arrPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#8b5cf6"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)" rx="12"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="1200" height="60" fill="url(#dark)" rx="12"/>
  <rect x="0" y="30" width="1200" height="30" fill="url(#dark)"/>
  <text x="600" y="28" text-anchor="middle" fill="white" font-size="20" font-weight="bold">VulnShield AI &#8212; How It Works</text>
  <text x="600" y="48" text-anchor="middle" fill="#94a3b8" font-size="11">End-to-End Flow: From Threat Detection to Automated Remediation</text>

  <!-- ==================== ROW 1: INPUTS (left to right) ==================== -->

  <!-- 1. Threat Feeds -->
  <rect x="30" y="90" width="170" height="120" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="30" y="90" width="170" height="32" rx="12" fill="url(#red)"/>
  <rect x="30" y="110" width="170" height="12" fill="url(#red)"/>
  <text x="115" y="112" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Threat Feeds</text>
  <text x="50" y="145" fill="#475569" font-size="10">&#x1F6A8; NIST NVD (new CVEs)</text>
  <text x="50" y="163" fill="#475569" font-size="10">&#x1F3F4; CISA KEV (exploited)</text>
  <text x="50" y="181" fill="#475569" font-size="10">&#x1F4CA; EPSS (exploit probability)</text>
  <text x="50" y="199" fill="#475569" font-size="10">&#x1F6E1;&#xFE0F; MITRE ATT&amp;CK</text>

  <!-- 2. AWS Accounts -->
  <rect x="230" y="90" width="170" height="120" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="230" y="90" width="170" height="32" rx="12" fill="url(#blue)"/>
  <rect x="230" y="110" width="170" height="12" fill="url(#blue)"/>
  <text x="315" y="112" text-anchor="middle" fill="white" font-size="11" font-weight="bold">AWS Accounts</text>
  <text x="250" y="145" fill="#475569" font-size="10">&#x1F3E2; Hub: 448549863273</text>
  <text x="250" y="163" fill="#475569" font-size="10">&#x1F517; Spoke: 950766978386</text>
  <text x="250" y="181" fill="#475569" font-size="10">&#x1F517; Spoke: + 200 accounts</text>
  <text x="250" y="199" fill="#94a3b8" font-size="9">STS AssumeRole cross-account</text>

  <!-- 3. Windows Servers -->
  <rect x="430" y="90" width="170" height="120" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="430" y="90" width="170" height="32" rx="12" fill="url(#blue)"/>
  <rect x="430" y="110" width="170" height="12" fill="url(#blue)"/>
  <text x="515" y="112" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Windows Servers</text>
  <text x="450" y="145" fill="#475569" font-size="10">&#x1F5A5;&#xFE0F; 12 servers (2 accounts)</text>
  <text x="450" y="163" fill="#475569" font-size="10">&#x2705; 3 running, SSM online</text>
  <text x="450" y="181" fill="#475569" font-size="10">&#x1F534; 9 stopped / offline</text>
  <text x="450" y="199" fill="#94a3b8" font-size="9">Win Server 2025 Datacenter</text>

  <!-- ==================== ROW 2: AGENT BRAIN (center) ==================== -->

  <!-- Big brain box -->
  <rect x="120" y="250" width="560" height="200" rx="16" fill="white" stroke="#8b5cf6" stroke-width="2" filter="url(#shDeep)"/>
  <rect x="120" y="250" width="560" height="38" rx="16" fill="url(#purple)"/>
  <rect x="120" y="275" width="560" height="13" fill="url(#purple)"/>
  <text x="400" y="276" text-anchor="middle" fill="white" font-size="14" font-weight="bold">&#x1F9E0; Autonomous AI Agent (Runs 24/7)</text>

  <!-- PRAL steps inside -->
  <rect x="140" y="300" width="120" height="50" rx="8" fill="#f0f9ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="200" y="322" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="bold">PERCEIVE</text>
  <text x="200" y="340" text-anchor="middle" fill="#64748b" font-size="8">Detect changes</text>

  <rect x="280" y="300" width="120" height="50" rx="8" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="340" y="322" text-anchor="middle" fill="#6d28d9" font-size="11" font-weight="bold">REASON</text>
  <text x="340" y="340" text-anchor="middle" fill="#64748b" font-size="8">LLM decides action</text>

  <rect x="420" y="300" width="120" height="50" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
  <text x="480" y="322" text-anchor="middle" fill="#065f46" font-size="11" font-weight="bold">ACT</text>
  <text x="480" y="340" text-anchor="middle" fill="#64748b" font-size="8">Patch / Notify / Ticket</text>

  <rect x="560" y="300" width="100" height="50" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="610" y="322" text-anchor="middle" fill="#92400e" font-size="11" font-weight="bold">LEARN</text>
  <text x="610" y="340" text-anchor="middle" fill="#64748b" font-size="8">Remember outcome</text>

  <!-- Arrows between PRAL -->
  <path d="M260 325 L275 325" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M400 325 L415 325" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M540 325 L555 325" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Loop arrow back -->
  <path d="M610 350 L610 370 L200 370 L200 350" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrOrange)"/>
  <text x="405" y="383" text-anchor="middle" fill="#92400e" font-size="8">Feedback loop — learns from every outcome</text>

  <!-- Policies + Memory -->
  <rect x="140" y="395" width="250" height="38" rx="8" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="265" y="415" text-anchor="middle" fill="#6d28d9" font-size="10">&#x1F4DC; 7 Natural Language Policies</text>
  <text x="265" y="428" text-anchor="middle" fill="#94a3b8" font-size="8">Plain English rules — no YAML</text>

  <rect x="410" y="395" width="250" height="38" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="535" y="415" text-anchor="middle" fill="#92400e" font-size="10">&#x1F9E0; Agent Memory &amp; Learning</text>
  <text x="535" y="428" text-anchor="middle" fill="#94a3b8" font-size="8">"Last ERP patch caused outage — be careful"</text>

  <!-- Input arrows to brain -->
  <path d="M115 180 L115 235 L150 250" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arrRed)"/>
  <path d="M315 210 L315 235 L300 250" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrBlue)"/>
  <path d="M515 210 L515 235 L450 250" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrBlue)"/>

  <!-- ==================== ROW 2: DECISION OUTPUTS (right side) ==================== -->

  <!-- Confidence routing box -->
  <rect x="720" y="250" width="450" height="200" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shDeep)"/>
  <rect x="720" y="250" width="450" height="38" rx="16" fill="url(#dark)"/>
  <rect x="720" y="275" width="450" height="13" fill="url(#dark)"/>
