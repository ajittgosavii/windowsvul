  <text x="850" y="725" text-anchor="middle" fill="#6d28d9" font-size="11" font-weight="bold">&#x1F4CB; Compliance Auditor</text>
  <text x="850" y="743" text-anchor="middle" fill="#64748b" font-size="9">NIST/CIS reports, Compliance tab</text>

